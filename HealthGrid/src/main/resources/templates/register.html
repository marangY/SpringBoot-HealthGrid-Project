<!DOCTYPE html>
<!--
  Spring Boot Controller 예시:
  @GetMapping("/register")
  public String registerPage(Model model) {
      model.addAttribute("registerForm", new RegisterForm());
      model.addAttribute("qrCodeBase64", totpService.generateQrCodeBase64()); // Base64 QR 이미지
      model.addAttribute("secretKey", totpService.generateSecretKey());       // 수동 입력용 키
      return "register";
  }

  @PostMapping("/register")
  public String register(@Valid @ModelAttribute RegisterForm form,
                         BindingResult result, Model model) {
      if (result.hasErrors()) return "register";
      userService.register(form);
      return "redirect:/login?registered";
  }

  RegisterForm 필드:
    - String username
    - String password
    - String passwordConfirm
    - String name
    - String otpCode (선택)
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(pageTitle='회원가입')}"></head>
<body>
<div class="auth-layout">

  <!-- Left: Form -->
  <div class="auth-left">
    <div class="auth-box">

      <!-- Logo -->
      <div style="display:flex; align-items:center; gap:var(--space-sm); margin-bottom:var(--space-2xl);">
        <div class="logo-icon" style="width:40px;height:40px;background:linear-gradient(135deg,var(--teal-500),var(--green-400));border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.1rem;">H</div>
        <span style="font-size:1.3rem;font-weight:700;">Health<span style="color:var(--color-primary);">Grid</span></span>
      </div>

      <h2 class="auth-title">회원가입</h2>
      <p class="auth-subtitle">건강한 라이프스타일의 시작, 헬스그리드에 가입하세요.</p>

      <!-- 전역 오류 메시지 -->
      <!-- globalError: String (null이면 표시 안 함) -->
      <div th:if="${globalError}" style="margin-bottom:var(--space-md); padding:var(--space-sm) var(--space-md); background:#fef2f2; border:1px solid #fecaca; border-radius:var(--radius-sm); color:#dc2626; font-size:0.9rem;">
        <span th:text="${globalError}"></span>
      </div>

      <!-- 가입 완료 메시지 -->
      <div th:if="${param.registered}" style="margin-bottom:var(--space-md); padding:var(--space-sm) var(--space-md); background:#f0fdf4; border:1px solid #bbf7d0; border-radius:var(--radius-sm); color:#16a34a; font-size:0.9rem;">
        회원가입이 완료되었습니다. 로그인해주세요.
      </div>

      <form th:action="@{/register}" method="post" th:object="${registerForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="form-group">
          <label class="form-label" for="regUsername">아이디</label>
          <input type="text" class="form-input" id="regUsername"
                 th:field="*{username}"
                 placeholder="영문, 숫자 조합 6자 이상" required>
          <p class="form-hint" th:if="${#fields.hasErrors('username')}"
             th:errors="*{username}" style="color:#dc2626;"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="regPassword">비밀번호</label>
          <input type="password" class="form-input" id="regPassword"
                 th:field="*{password}"
                 placeholder="8자 이상 입력" required>
          <p class="form-hint" th:if="${#fields.hasErrors('password')}"
             th:errors="*{password}" style="color:#dc2626;"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="regPasswordConfirm">비밀번호 확인</label>
          <input type="password" class="form-input" id="regPasswordConfirm"
                 th:field="*{passwordConfirm}"
                 placeholder="비밀번호를 다시 입력" required>
          <p class="form-hint" th:if="${#fields.hasErrors('passwordConfirm')}"
             th:errors="*{passwordConfirm}" style="color:#dc2626;"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="regName">사용자 이름</label>
          <input type="text" class="form-input" id="regName"
                 th:field="*{name}"
                 placeholder="이름을 입력하세요" required>
          <p class="form-hint" th:if="${#fields.hasErrors('name')}"
             th:errors="*{name}" style="color:#dc2626;"></p>
        </div>

        <!-- Google Authenticator 등록 -->
        <!-- qrCodeBase64: String (Base64 PNG), secretKey: String -->
        <div class="form-group">
          <label class="form-label">Google Authenticator 등록 (선택)</label>
          <div class="card" style="background:var(--color-bg-subtle); box-shadow:none; padding:var(--space-md); text-align:center;">
            <div style="margin-bottom:var(--space-sm);">
              <!-- 서버에서 생성한 QR 코드 이미지 (Base64) -->
              <img th:if="${qrCodeBase64}"
                   th:src="'data:image/png;base64,' + ${qrCodeBase64}"
                   alt="QR Code"
                   style="width:160px;height:160px;margin:0 auto;display:block;border-radius:var(--radius-md);border:1px solid var(--color-border);">
              <!-- QR 코드가 없을 때 플레이스홀더 -->
              <div th:unless="${qrCodeBase64}"
                   style="width:160px;height:160px;margin:0 auto;background:#fff;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;border:1px solid var(--color-border);">
                <svg width="120" height="120" viewBox="0 0 120 120">
                  <rect x="10" y="10" width="30" height="30" fill="var(--color-text)" rx="2"/>
                  <rect x="80" y="10" width="30" height="30" fill="var(--color-text)" rx="2"/>
                  <rect x="10" y="80" width="30" height="30" fill="var(--color-text)" rx="2"/>
                  <rect x="15" y="15" width="20" height="20" fill="#fff" rx="1"/>
                  <rect x="85" y="15" width="20" height="20" fill="#fff" rx="1"/>
                  <rect x="15" y="85" width="20" height="20" fill="#fff" rx="1"/>
                  <rect x="20" y="20" width="10" height="10" fill="var(--color-text)" rx="1"/>
                  <rect x="90" y="20" width="10" height="10" fill="var(--color-text)" rx="1"/>
                  <rect x="20" y="90" width="10" height="10" fill="var(--color-text)" rx="1"/>
                  <rect x="50" y="10" width="8" height="8" fill="var(--color-text)" rx="1"/>
                  <rect x="50" y="25" width="8" height="8" fill="var(--color-text)" rx="1"/>
                  <rect x="62" y="10" width="8" height="8" fill="var(--color-text)" rx="1"/>
                  <rect x="50" y="50" width="10" height="10" fill="var(--color-text)" rx="1"/>
                  <rect x="65" y="50" width="8" height="8" fill="var(--color-text)" rx="1"/>
                  <rect x="80" y="50" width="8" height="8" fill="var(--color-text)" rx="1"/>
                  <rect x="50" y="65" width="8" height="8" fill="var(--color-text)" rx="1"/>
                  <rect x="50" y="80" width="8" height="8" fill="var(--color-text)" rx="1"/>
                  <rect x="65" y="80" width="8" height="8" fill="var(--color-text)" rx="1"/>
                  <rect x="80" y="80" width="30" height="30" fill="var(--color-text)" rx="2"/>
                  <rect x="85" y="85" width="20" height="20" fill="#fff" rx="1"/>
                  <rect x="90" y="90" width="10" height="10" fill="var(--color-text)" rx="1"/>
                </svg>
              </div>
            </div>
            <p class="text-sm text-muted" style="margin-bottom:var(--space-sm);">Google Authenticator 앱으로 QR 코드를 스캔하세요</p>
            <!-- secretKey: 수동 입력용 키 -->
            <div style="background:#fff;padding:var(--space-sm) var(--space-md);border-radius:var(--radius-sm);border:1px solid var(--color-border);font-family:monospace;font-size:0.85rem;letter-spacing:0.1em;display:inline-block;"
                 th:text="${secretKey} ?: 'JBSWY3DPEHPK3PXP'">JBSWY3DPEHPK3PXP</div>
            <p class="text-xs text-muted mt-sm">또는 위 코드를 수동으로 입력하세요</p>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regOtp">인증 코드 확인</label>
          <input type="text" class="form-input" id="regOtp"
                 th:field="*{otpCode}"
                 placeholder="6자리 인증 코드 입력"
                 maxlength="6"
                 style="letter-spacing:0.3em; text-align:center; font-size:1.2rem;">
          <p class="form-hint">Google Authenticator 앱에 표시된 6자리 코드를 입력하세요</p>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full" style="margin-top:var(--space-md);">가입하기</button>
      </form>

      <p style="text-align:center; margin-top:var(--space-lg); font-size:0.9rem; color:var(--color-text-secondary);">
        이미 계정이 있으신가요? <a th:href="@{/login}" style="font-weight:600;">로그인</a>
      </p>
    </div>
  </div>

  <!-- Right: Visual -->
  <div class="auth-right" style="background-image:url('https://d2xsxph8kpxj0f.cloudfront.net/310519663539254530/E5XfMLNghuionsufigPudH/login-bg-UmfdyFau2xeDvtkusoW4n2.webp');">
    <div class="auth-quote">
      <h2 style="font-size:1.8rem; margin-bottom:var(--space-md); color:#fff;">건강한 변화의 시작</h2>
      <p style="font-size:1rem; opacity:0.9; line-height:1.7;">체계적인 식단 관리와 운동 추적으로<br>당신의 건강 목표를 달성하세요.</p>
    </div>
  </div>

</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
