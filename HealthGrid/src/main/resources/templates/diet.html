<!DOCTYPE html>
<!--
  Spring Boot Controller 예시:
  @GetMapping("/diet")
  public String dietPage(Model model, @AuthenticationPrincipal UserDetails userDetails) {
      UserDto user = userService.getUserByUsername(userDetails.getUsername());
      List<DailyDietDto> weeklyData = mealService.getWeeklyDietData(user.getId()); // 최근 7일
      List<MealDto> allMeals = mealService.getAllMeals(user.getId());               // 전체 식단 목록
      String nutritionComment = mealService.getNutritionComment(weeklyData);       // 영양 코멘트
      model.addAttribute("user", user);
      model.addAttribute("weeklyData", weeklyData);   // List<DailyDietDto>
      model.addAttribute("allMeals", allMeals);       // List<MealDto>
      model.addAttribute("nutritionComment", nutritionComment);
      model.addAttribute("targetCalories", user.getTargetCalories());
      model.addAttribute("uploadForm", new MealUploadForm());
      return "diet";
  }

  @PostMapping("/diet/upload")
  public String uploadMeal(@ModelAttribute MealUploadForm form,
                            @RequestParam("image") MultipartFile image,
                            RedirectAttributes ra) {
      // 이미지 저장 → 영양 분석 서비스 호출 → DB 저장
      ra.addFlashAttribute("successMessage", "식단이 등록되었습니다.");
      return "redirect:/diet";
  }

  DailyDietDto 필드: date(LocalDate), label(월/화/수...), totalCalories(int),
                     carbsCalories(int), proteinCalories(int), fatCalories(int)
  MealDto 필드: id, date(LocalDate), tag(아침/점심/저녁/간식), name,
                imageUrl, calories, carbs, protein, fat
  MealUploadForm: tag, imagePath(서버 저장 후 경로)
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(pageTitle='식단 관리')}"></head>
<body>
<div class="app-layout">

  <div th:replace="~{fragments/sidebar :: sidebar(activePage='diet')}"></div>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h1>식단 관리</h1>
        <p class="text-sm text-muted">오늘 먹은 음식을 기록하고 영양을 분석하세요</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal('uploadMealModal')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          식단 등록
        </button>
      </div>
    </header>

    <div class="page-body">

      <!-- 저장 성공 메시지 -->
      <div th:if="${successMessage}"
           style="margin-bottom:var(--space-md); padding:var(--space-sm) var(--space-md); background:#f0fdf4; border:1px solid #bbf7d0; border-radius:var(--radius-sm); color:#16a34a; font-size:0.9rem;"
           th:text="${successMessage}"></div>

      <!-- Weekly Calorie Chart -->
      <!--
        weeklyData: List<DailyDietDto> (7개, 오래된 날짜 → 최신 날짜 순)
        targetCalories: int
        차트는 JS로 렌더링. 데이터를 hidden input 또는 data attribute로 전달
      -->
      <div class="card mb-lg animate-fade-in-up">
        <div class="card-header">
          <div class="card-title">최근 7일 칼로리 추이</div>
          <div class="text-sm text-muted">목표: <strong th:text="${targetCalories}">2200</strong> kcal</div>
        </div>

        <!-- 차트 데이터: JSON으로 직렬화하여 JS에 전달 -->
        <div id="weeklyChartData"
             th:attr="data-weekly=${weeklyDataJson}, data-target=${targetCalories}"
             style="display:none;"></div>

        <!-- 차트 컨테이너 -->
        <div id="weeklyChart" style="margin-top:var(--space-md);"></div>

        <!-- 영양 코멘트 -->
        <!-- nutritionComment: String -->
        <div th:if="${nutritionComment}"
             style="margin-top:var(--space-lg); padding:var(--space-md); background:var(--teal-50); border-radius:var(--radius-sm); border-left:3px solid var(--teal-500);">
          <div class="text-sm font-medium" style="color:var(--teal-700); margin-bottom:var(--space-xs);">영양 분석 코멘트</div>
          <p class="text-sm" style="color:var(--teal-800); line-height:1.6;" th:text="${nutritionComment}">
            단백질 섭취가 목표치보다 낮습니다. 닭가슴살, 두부, 계란 등 단백질이 풍부한 식품을 추가해보세요.
          </p>
        </div>
      </div>

      <!-- Meal List (7일간 전체) -->
      <!-- allMeals: List<MealDto> -->
      <div class="card animate-fade-in-up">
        <div class="card-header">
          <div class="card-title">식단 기록</div>
          <div class="text-sm text-muted" th:text="${allMeals.size()} + '개 기록'">21개 기록</div>
        </div>

        <!-- 식단 없을 때 -->
        <div th:if="${allMeals.isEmpty()}"
             style="text-align:center; padding:var(--space-2xl); color:var(--color-text-muted);">
          등록된 식단이 없습니다. 식단 등록 버튼을 눌러 추가하세요.
        </div>

        <!-- 날짜별 그룹 렌더링 -->
        <!-- mealsByDate: Map<LocalDate, List<MealDto>> (컨트롤러에서 groupingBy 처리 권장) -->
        <div th:unless="${allMeals.isEmpty()}" class="flex-col gap-md">
          <div th:each="meal : ${allMeals}" class="meal-card">
            <img class="meal-img"
                 th:src="${meal.imageUrl}"
                 th:alt="${meal.name}"
                 src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200&h=200&fit=crop">
            <div class="meal-info">
              <div style="display:flex; align-items:center; gap:var(--space-sm); margin-bottom:var(--space-xs);">
                <span class="meal-tag"
                      th:text="${meal.tag}"
                      th:style="${meal.tag == '아침'} ? 'background:var(--teal-50); color:var(--teal-700);' :
                                 (${meal.tag == '점심'} ? 'background:var(--green-50); color:var(--green-600);' :
                                 (${meal.tag == '저녁'} ? 'background:#eff6ff; color:#2563eb;' :
                                  'background:#fefce8; color:#ca8a04;'))">아침</span>
                <!-- meal.date: LocalDate -->
                <span class="text-xs text-muted"
                      th:text="${#temporals.format(meal.date, 'M월 d일')}">4월 11일</span>
              </div>
              <div class="meal-name" th:text="${meal.name}">통밀 토스트 + 스크램블 에그</div>
              <div class="meal-nutrients">
                <span><strong th:text="${meal.calories}">450</strong> kcal</span>
                <span>탄수화물 <strong th:text="${meal.carbs} + 'g'">52g</strong></span>
                <span>단백질 <strong th:text="${meal.protein} + 'g'">22g</strong></span>
                <span>지방 <strong th:text="${meal.fat} + 'g'">18g</strong></span>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Upload Meal Modal -->
  <!-- POST /diet/upload (multipart/form-data) -->
  <div class="modal-overlay" id="uploadMealModal">
    <div class="modal">
      <div class="modal-header">
        <h3>식단 등록</h3>
        <div class="modal-close" onclick="closeModal('uploadMealModal')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </div>
      </div>
      <form th:action="@{/diet/upload}" method="post" enctype="multipart/form-data" th:object="${uploadForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- 식사 태그 선택 -->
        <div class="form-group">
          <label class="form-label">식사 구분</label>
          <div style="display:flex; gap:var(--space-sm); flex-wrap:wrap;">
            <label th:each="tagOption : ${ {'아침','점심','저녁','간식'} }"
                   style="display:flex; align-items:center; gap:var(--space-xs); cursor:pointer; padding:var(--space-xs) var(--space-sm); border:1px solid var(--color-border); border-radius:var(--radius-sm); font-size:0.9rem;">
              <input type="radio" name="tag" th:value="${tagOption}" th:checked="${tagOption == '아침'}"
                     style="accent-color:var(--color-primary);">
              <span th:text="${tagOption}">아침</span>
            </label>
          </div>
        </div>

        <!-- 이미지 업로드 존 -->
        <div class="form-group">
          <label class="form-label">음식 사진</label>
          <div class="upload-zone" id="uploadZone"
               onclick="document.getElementById('mealImageInput').click()"
               ondragover="event.preventDefault(); this.classList.add('drag-over')"
               ondragleave="this.classList.remove('drag-over')"
               ondrop="handleDrop(event)">
            <div class="upload-zone-content" id="uploadZoneContent">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--color-text-muted); margin-bottom:var(--space-sm);">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <p class="text-sm" style="color:var(--color-text-muted); margin-bottom:var(--space-xs);">클릭하거나 이미지를 드래그하세요</p>
              <p class="text-xs text-muted">JPG, PNG, WEBP (최대 10MB)</p>
            </div>
            <img id="uploadPreview" style="display:none; width:100%; height:200px; object-fit:cover; border-radius:var(--radius-sm);" alt="미리보기">
          </div>
          <!-- 실제 파일 input (hidden) -->
          <input type="file" id="mealImageInput" name="image" accept="image/*"
                 style="display:none;" onchange="handleFileSelect(this)">
        </div>

        <div style="display:flex; gap:var(--space-sm); justify-content:flex-end; margin-top:var(--space-md);">
          <button type="button" class="btn btn-outline" onclick="closeModal('uploadMealModal')">취소</button>
          <button type="submit" class="btn btn-primary">등록하기</button>
        </div>
      </form>
    </div>
  </div>

</div>

<script th:src="@{/js/app.js}"></script>
<script>
  initSidebar();
  initNavHighlight();

  // 차트 렌더링 (weeklyDataJson을 서버에서 JSON 문자열로 전달)
  const chartDataEl = document.getElementById('weeklyChartData');
  if (chartDataEl) {
    const weeklyData = JSON.parse(chartDataEl.dataset.weekly || '[]');
    const targetCal = parseInt(chartDataEl.dataset.target || '2200');
    renderWeeklyChart(weeklyData, targetCal);
  }

  // 이미지 업로드 핸들러
  function handleFileSelect(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('uploadZoneContent').style.display = 'none';
        const preview = document.getElementById('uploadPreview');
        preview.src = e.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function handleDrop(event) {
    event.preventDefault();
    document.getElementById('uploadZone').classList.remove('drag-over');
    const file = event.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const dt = new DataTransfer();
      dt.items.add(file);
      document.getElementById('mealImageInput').files = dt.files;
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('uploadZoneContent').style.display = 'none';
        const preview = document.getElementById('uploadPreview');
        preview.src = e.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  }

  // 차트 렌더링 함수
  // weeklyData: [{label, totalCalories, carbsCalories, proteinCalories, fatCalories}]
  function renderWeeklyChart(weeklyData, targetCal) {
    const container = document.getElementById('weeklyChart');
    if (!container || !weeklyData.length) return;

    const maxCal = Math.max(...weeklyData.map(d => d.totalCalories), targetCal) * 1.15;
    const barAreaH = 230;

    let html = `<div style="display:flex; gap:8px; align-items:flex-end; position:relative; height:${barAreaH + 50}px; padding:0 8px;">`;

    // 목표 칼로리 점선
    const targetPct = (targetCal / maxCal) * 100;
    const targetBottom = (targetPct / 100) * barAreaH;
    html += `<div style="position:absolute; left:0; right:0; bottom:${targetBottom + 40}px; border-top:2px dashed var(--teal-400); z-index:2; pointer-events:none;">
      <span style="position:absolute; right:4px; top:-18px; font-size:0.7rem; color:var(--teal-600); font-weight:600;">목표 ${targetCal.toLocaleString()} kcal</span>
    </div>`;

    weeklyData.forEach(day => {
      const total = day.totalCalories || 0;
      const barH = total > 0 ? Math.max((total / maxCal) * barAreaH, 4) : 4;
      const carbH = total > 0 ? (day.carbsCalories / total) * barH : 0;
      const protH = total > 0 ? (day.proteinCalories / total) * barH : 0;
      const fatH  = total > 0 ? (day.fatCalories / total) * barH : 0;

      html += `<div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:0; height:${barAreaH + 50}px; justify-content:flex-end; position:relative; z-index:1;">
        <div style="font-size:0.65rem; color:var(--color-text-muted); margin-bottom:4px;">${total > 0 ? total.toLocaleString() : '-'}</div>
        <div style="width:100%; display:flex; flex-direction:column-reverse; border-radius:4px 4px 0 0; overflow:hidden; height:${barH}px;">
          <div style="height:${carbH}px; background:var(--teal-400);"></div>
          <div style="height:${protH}px; background:var(--green-400);"></div>
          <div style="height:${fatH}px; background:#fbbf24;"></div>
        </div>
        <div style="font-size:0.75rem; color:var(--color-text-secondary); margin-top:6px; font-weight:500;">${day.label}</div>
      </div>`;
    });

    html += '</div>';

    // 범례
    html += `<div style="display:flex; gap:var(--space-md); margin-top:var(--space-sm); justify-content:center; flex-wrap:wrap;">
      <div style="display:flex; align-items:center; gap:4px; font-size:0.8rem; color:var(--color-text-secondary);">
        <div style="width:12px;height:12px;background:var(--teal-400);border-radius:2px;"></div>탄수화물
      </div>
      <div style="display:flex; align-items:center; gap:4px; font-size:0.8rem; color:var(--color-text-secondary);">
        <div style="width:12px;height:12px;background:var(--green-400);border-radius:2px;"></div>단백질
      </div>
      <div style="display:flex; align-items:center; gap:4px; font-size:0.8rem; color:var(--color-text-secondary);">
        <div style="width:12px;height:12px;background:#fbbf24;border-radius:2px;"></div>지방
      </div>
    </div>`;

    container.innerHTML = html;
  }
</script>
</body>
</html>
