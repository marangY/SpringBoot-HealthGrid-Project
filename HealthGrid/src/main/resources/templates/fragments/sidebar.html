<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--/* 공통 사이드바 fragment
     사용법: <div th:replace="~{fragments/sidebar :: sidebar(activePage='dashboard')}"></div>
     activePage 값: dashboard | profile | diet | exercise | community
*/-->
<nav th:fragment="sidebar(activePage)" class="sidebar" id="sidebar">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-icon">H</div>
    <span class="logo-text">Health<span>Grid</span></span>
  </div>

  <!-- Navigation -->
  <div class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-title">메인</div>
      <a th:href="@{/}" class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        대시보드
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">건강 관리</div>
      <a th:href="@{/profile}" class="nav-item" th:classappend="${activePage == 'profile'} ? 'active' : ''">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        체형 정보
      </a>
      <a th:href="@{/diet}" class="nav-item" th:classappend="${activePage == 'diet'} ? 'active' : ''">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
        식단 관리
      </a>
      <a th:href="@{/exercise}" class="nav-item" th:classappend="${activePage == 'exercise'} ? 'active' : ''">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 3a3 3 0 0 0-3 3l-7 2a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3l7-2a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/>
        </svg>
        운동 관리
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">소셜</div>
      <a th:href="@{/community}" class="nav-item" th:classappend="${activePage == 'community'} ? 'active' : ''">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        커뮤니티
      </a>
    </div>
  </div>

  <!-- User Profile Area -->
  <div class="sidebar-user" id="sidebarUser" onclick="openMyPostsModal()" style="cursor:pointer;">
    <div class="user-avatar" th:text="${#strings.substring(user.name, 0, 1)}">김</div>
    <div class="user-info">
      <div class="user-name" th:text="${user.name}">김건강</div>
      <div class="user-email" th:text="${user.email}">health@example.com</div>
    </div>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:auto; color:var(--color-text-muted);">
      <rect x="3" y="3" width="7" height="5"/><rect x="14" y="3" width="7" height="11"/>
      <rect x="3" y="12" width="7" height="9"/><rect x="14" y="18" width="7" height="3"/>
    </svg>
  </div>
</nav>

<!-- Mobile overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Mobile toggle button -->
<button class="mobile-toggle" id="mobileToggle" onclick="toggleSidebar()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

</body>
</html>
