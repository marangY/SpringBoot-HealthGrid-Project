<!DOCTYPE html>
<!--
  Spring Boot Controller 예시:
  @GetMapping("/exercise")
  public String exercisePage(Model model, @AuthenticationPrincipal UserDetails userDetails) {
      UserDto user = userService.getUserByUsername(userDetails.getUsername());
      List<RecommendedExerciseDto> recommendations = exerciseService.getRecommendations(user);
      List<ExerciseLogDto> todayLogs = exerciseService.getTodayLogs(user.getId());
      int todayBurned = exerciseService.getTodayTotalCalories(user.getId());
      int dailyTarget = exerciseService.getDailyTargetCalories(user);
      int achievePercent = dailyTarget > 0 ? Math.min((int)(todayBurned * 100.0 / dailyTarget), 100) : 0;
      model.addAttribute("user", user);
      model.addAttribute("recommendations", recommendations);
      model.addAttribute("todayLogs", todayLogs);
      model.addAttribute("todayBurned", todayBurned);
      model.addAttribute("dailyTarget", dailyTarget);
      model.addAttribute("achievePercent", achievePercent);
      model.addAttribute("logForm", new ExerciseLogForm());
      return "exercise";
  }

  @PostMapping("/exercise/log")
  public String logExercise(@Valid @ModelAttribute ExerciseLogForm form,
                             BindingResult result, RedirectAttributes ra) {
      exerciseService.saveLog(form);
      ra.addFlashAttribute("successMessage", "운동이 기록되었습니다.");
      return "redirect:/exercise";
  }

  RecommendedExerciseDto 필드: name, description, duration(String), calories(int), difficulty(초급/중급/고급)
  ExerciseLogDto 필드: id, name, detail, calories, loggedAt(LocalDateTime)
  ExerciseLogForm 필드: exerciseText(사용자 입력 텍스트), calories(int)
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(pageTitle='운동 관리')}"></head>
<body>
<div class="app-layout">

  <div th:replace="~{fragments/sidebar :: sidebar(activePage='exercise')}"></div>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h1>운동 관리</h1>
        <p class="text-sm text-muted">맞춤 운동 추천과 오늘의 운동을 기록하세요</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal('logExerciseModal')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          운동 기록
        </button>
      </div>
    </header>

    <div class="page-body">

      <!-- 저장 성공 메시지 -->
      <div th:if="${successMessage}"
           style="margin-bottom:var(--space-md); padding:var(--space-sm) var(--space-md); background:#f0fdf4; border:1px solid #bbf7d0; border-radius:var(--radius-sm); color:#16a34a; font-size:0.9rem;"
           th:text="${successMessage}"></div>

      <!-- Today's Progress -->
      <!-- todayBurned: int, dailyTarget: int, achievePercent: int -->
      <div class="card mb-lg animate-fade-in-up">
        <div class="card-header">
          <div class="card-title">오늘의 운동 현황</div>
          <span class="badge"
                th:classappend="${achievePercent >= 100} ? 'badge-success' : 'badge-primary'"
                th:text="${achievePercent} + '% 달성'">70% 달성</span>
        </div>
        <div style="display:flex; align-items:center; gap:var(--space-xl);">
          <div class="circular-progress">
            <svg width="120" height="120" viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="52" fill="none" stroke="var(--color-bg-muted)" stroke-width="10"/>
              <circle cx="60" cy="60" r="52" fill="none" stroke="url(#exProgressGrad)" stroke-width="10"
                      stroke-linecap="round" stroke-dasharray="326.73"
                      th:attr="stroke-dashoffset=${326.73 * (1 - achievePercent / 100.0)}"
                      style="stroke-dashoffset:98;"></circle>
              <defs>
                <linearGradient id="exProgressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="var(--teal-500)"/>
                  <stop offset="100%" stop-color="var(--green-400)"/>
                </linearGradient>
              </defs>
            </svg>
            <div class="progress-text">
              <div class="progress-value" th:text="${achievePercent} + '%'">70%</div>
              <div class="progress-label">달성률</div>
            </div>
          </div>
          <div class="flex-col gap-sm" style="flex:1;">
            <div>
              <div class="text-sm text-muted">소모 칼로리</div>
              <div class="font-bold" style="font-size:1.4rem;">
                <span th:text="${todayBurned}">420</span>
                <span class="text-sm font-medium text-muted">
                  / <span th:text="${dailyTarget}">600</span> kcal
                </span>
              </div>
            </div>
            <div class="progress-bar">
              <div class="progress-fill"
                   th:style="'width:' + ${achievePercent} + '%;'"
                   style="width:70%;"></div>
            </div>
            <div class="text-sm text-muted">
              목표까지 <strong th:text="${dailyTarget - todayBurned > 0 ? dailyTarget - todayBurned : 0}">180</strong> kcal 남았습니다
            </div>
          </div>
        </div>
      </div>

      <div class="grid grid-2 mb-lg">

        <!-- Recommended Exercises (아이콘 없음) -->
        <!-- recommendations: List<RecommendedExerciseDto> -->
        <div class="card animate-fade-in-up">
          <div class="card-header">
            <div class="card-title">맞춤 운동 추천</div>
            <div class="text-sm text-muted"
                 th:text="${user.name} + '님을 위한 추천'">김건강님을 위한 추천</div>
          </div>
          <div class="flex-col gap-sm">
            <div class="recommended-card" th:each="rec : ${recommendations}">
              <div class="rec-content">
                <div class="rec-name" th:text="${rec.name}">스쿼트</div>
                <div class="rec-desc" th:text="${rec.description}">하체 근력 강화에 효과적인 기본 운동</div>
                <div class="rec-meta">
                  <span th:text="${rec.duration}">3세트 × 15회</span>
                  <span th:text="${rec.calories} + ' kcal'">120 kcal</span>
                  <span class="badge"
                        th:classappend="${rec.difficulty == '초급'} ? 'badge-success' : (${rec.difficulty == '중급'} ? 'badge-primary' : 'badge-warning')"
                        th:text="${rec.difficulty}">중급</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Today's Exercise Log (아이콘 없음) -->
        <!-- todayLogs: List<ExerciseLogDto> -->
        <div class="card animate-fade-in-up">
          <div class="card-header">
            <div class="card-title">오늘의 운동 기록</div>
            <div class="text-sm text-muted"
                 th:text="${todayLogs.size()} + '개 기록'">3개 기록</div>
          </div>

          <!-- 운동 없을 때 -->
          <div th:if="${todayLogs.isEmpty()}"
               style="text-align:center; padding:var(--space-2xl); color:var(--color-text-muted);">
            오늘 기록된 운동이 없습니다.
          </div>

          <!-- 운동 목록 (아이콘 없음) -->
          <div class="flex-col gap-sm" th:unless="${todayLogs.isEmpty()}">
            <div class="exercise-card" th:each="log : ${todayLogs}">
              <div class="exercise-info">
                <div class="exercise-name" th:text="${log.name}">러닝</div>
                <div class="exercise-detail" th:text="${log.detail}">30분 · 5.2km</div>
              </div>
              <div class="exercise-cal" th:text="${log.calories} + ' kcal'">280 kcal</div>
            </div>
          </div>

          <div style="margin-top:var(--space-md); padding-top:var(--space-md); border-top:1px solid var(--color-border);">
            <div class="flex-row justify-between">
              <span class="text-sm font-medium">총 소모 칼로리</span>
              <span class="font-bold text-primary" th:text="${todayBurned} + ' kcal'">420 kcal</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Log Exercise Modal -->
  <!-- POST /exercise/log -->
  <div class="modal-overlay" id="logExerciseModal">
    <div class="modal">
      <div class="modal-header">
        <h3>운동 기록</h3>
        <div class="modal-close" onclick="closeModal('logExerciseModal')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </div>
      </div>
      <form th:action="@{/exercise/log}" method="post" th:object="${logForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="form-group">
          <label class="form-label">운동 내용</label>
          <textarea class="form-input" th:field="*{exerciseText}" rows="4"
                    placeholder="예: 러닝 30분, 5.2km / 벤치프레스 4세트 10회 60kg"
                    style="resize:vertical;"></textarea>
          <p class="form-hint">시행한 운동명, 횟수, 시간 등을 자유롭게 입력하세요</p>
        </div>
        <div class="form-group">
          <label class="form-label">소모 칼로리 (kcal)</label>
          <input type="number" class="form-input" th:field="*{calories}"
                 placeholder="소모한 칼로리를 입력하세요" min="0" max="5000">
        </div>
        <div style="display:flex; gap:var(--space-sm); justify-content:flex-end;">
          <button type="button" class="btn btn-outline" onclick="closeModal('logExerciseModal')">취소</button>
          <button type="submit" class="btn btn-primary">기록하기</button>
        </div>
      </form>
    </div>
  </div>

</div>

<script th:src="@{/js/app.js}"></script>
<script>
  initSidebar();
  initNavHighlight();
</script>
</body>
</html>
